<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>
<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
  padding-top: 50px;
}

form {
  background: white;
  display: inline-block;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
  text-align: left;
}

input[type="text"], input[type="email"], textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  background-color: #e74c3c;
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #c0392b;
}
</style>
</head>
<body>

<h2>Contact Us</h2>

<form>
  <label>Name</label><br>
  <input type="text" placeholder="Your Name"><br>
  
  <label>Email</label><br>
  <input type="email" placeholder="Your Email"><br>
  
  <label>Message</label><br>
  <textarea rows="5" placeholder="Type your message here"></textarea><br><br>
  
  <button type="submit">Send Message</button>
</form>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
  padding-top: 50px;
}

form {
  background: white;
  display: inline-block;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input[type="text"], input[type="password"] {
  width: 250px;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  background-color: #3498db;
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #2980b9;
}
</style>
</head>
<body>

<h2>Student Login</h2>

<form>
  <input type="text" placeholder="Username"><br>
  <input type="password" placeholder="Password"><br><br>
  <button type="submit">Login</button>
</form>

<p>Don't have an account? <a href="register.html">Register Here</a></p>

</body>
</html>
